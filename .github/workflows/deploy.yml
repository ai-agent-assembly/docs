name: Build and Deploy Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "docs/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv mdbook /usr/local/bin/

      - name: Build
        run: cd docs && mdbook build

      # Resolve the version subpath this run publishes into.
      # main push  -> "latest"
      # tag push   -> the tag name without the leading "v" (e.g. v0.1.0 -> 0.1.0)
      - name: Resolve version slug
        id: slug
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            slug="${GITHUB_REF_NAME#v}"
          else
            slug="latest"
          fi
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

      # Tag-only: preserve previously published version subpaths on a release
      # tag build. The Pages artifact deploy replaces the whole site, so prior
      # frozen versions must be re-staged from the live site before we add the
      # new one. This step is the per-version aggregation step at release time.
      - name: Preserve existing published versions (release tag only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          mkdir -p site
          pages_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "Fetching currently published site from ${pages_url} to preserve existing versions"
          # Mirror the live site; ignore failure on first-ever release (nothing published yet).
          wget --quiet --recursive --no-parent --no-host-directories \
               --directory-prefix=site "${pages_url}/" || \
            echo "No existing published site found (first release) — continuing"

      # Assemble the deployable site root:
      #   <root>/index.html        -> redirect to latest/
      #   <root>/versions.json     -> version manifest read by the theme dropdown
      #   <root>/<slug>/           -> the freshly built book
      - name: Stage site
        if: github.event_name == 'push'
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          set -euo pipefail
          mkdir -p site

          # Drop in the freshly built book at its version subpath.
          rm -rf "site/${SLUG}"
          mkdir -p "site/${SLUG}"
          cp -r docs/book/. "site/${SLUG}/"

          # Root redirect -> latest/
          cp docs/site-root/index.html site/index.html

          # Rebuild versions.json: always include latest, plus every version subpath
          # currently staged (existing tags + this build's slug).
          python3 - "$SLUG" <<'PY'
          import json, os, sys
          slug = sys.argv[1]
          site = "site"
          # Discover version subpaths already staged (dirs holding an index.html, excluding root).
          found = set()
          for name in os.listdir(site):
              p = os.path.join(site, name)
              if os.path.isdir(p) and os.path.isfile(os.path.join(p, "index.html")):
                  found.add(name)
          found.add(slug)
          found.add("latest")

          def entry(vid):
              return {"id": vid, "label": vid, "path": f"{vid}/"}

          # latest first, then frozen versions newest-ish (reverse sort) for stable ordering.
          versions = [entry("latest")]
          for vid in sorted((v for v in found if v != "latest"), reverse=True):
              versions.append(entry(vid))

          with open(os.path.join(site, "versions.json"), "w") as f:
              json.dump({"versions": versions}, f, indent=2)
              f.write("\n")
          print("versions.json:", versions)
          PY

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
