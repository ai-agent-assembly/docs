name: Aggregate and Deploy Docs Hub

# Central docs hub aggregation (AAASM-3659). Builds the hub mdBook at the site
# root plus each module's docs under a stable subpath (pull/aggregate model —
# every module keeps its own generator), runs Pagefind over the final public/
# for unified search, verifies every module produced non-empty output, and
# deploys the combined site to GitHub Pages (→ docs.agent-assembly.com once the
# owner attaches the custom domain).
#
# Module registry: modules.json. Build/copy contract: docs/scripts/aggregate.sh.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Source repos (core, python-sdk, node-sdk, go-sdk, arena, ...) publish new
  # content straight to their own gh-pages branches on their own schedules,
  # which never touches this repo, so push/pull_request/workflow_dispatch
  # alone leave the hub re-aggregating only when something unrelated happens
  # to land on docs' own main (AAASM-4508). Poll on a fixed cadence for
  # best-effort periodic self-healing, rather than leaving staleness
  # unbounded. GitHub Actions `schedule` triggers are best-effort, not
  # guaranteed-exact: observed real-world delays between runs have reached
  # several hours, not the 30-minute cadence configured below (AAASM-4508
  # follow-up, 2026-07-14). If this data path ever needs a hard freshness
  # SLA, revisit an event-driven `repository_dispatch` or GitHub App
  # trigger instead — deliberately not done here to avoid a new cross-repo
  # credential.
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Permissions are declared per job (least privilege, no workflow-level default):
# the build job only clones public repos and builds, so it needs read access to
# this repo's contents; the deploy job below opts up to the Pages scopes only.
jobs:
  build:
    name: Aggregate all module docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout hub
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      # --- toolchains, one per generator ---
      - name: Install mdBook + mdbook-mermaid (hub + core)
        # mdBook 0.5.2 / mdbook-mermaid 0.17.0 match the core repo's docs
        # toolchain — core's theme uses the `{{ resource }}` helper (mdBook
        # 0.4.41+), so the older 0.4.x in deploy.yml cannot render it.
        run: |
          set -euo pipefail
          # SHA-256 of the pinned release tarballs. Upstream publishes no
          # .sha256 sidecar assets, so these were computed from the v0.5.2 /
          # v0.17.0 x86_64-unknown-linux-gnu tarballs and pinned here; the
          # download is verified against them before anything is executed, so a
          # tampered/MITM'd asset fails the step closed instead of running.
          MDBOOK_SHA256=084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d
          MERMAID_SHA256=8aced70d781830fb0e81988f081c4abdd49e056a001ae2f1e4d484e1f6385c57
          curl --proto '=https' -sSL -o mdbook.tar.gz https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz
          curl --proto '=https' -sSL -o mdbook-mermaid.tar.gz https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz
          echo "${MDBOOK_SHA256}  mdbook.tar.gz" | sha256sum -c -
          echo "${MERMAID_SHA256}  mdbook-mermaid.tar.gz" | sha256sum -c -
          tar -xzf mdbook.tar.gz
          tar -xzf mdbook-mermaid.tar.gz
          sudo mv mdbook mdbook-mermaid /usr/local/bin/

      - name: Install mdbook-gettext (hub i18n — AAASM-4697)
        # The hub's book.toml enables the mdbook-i18n-helpers `gettext`
        # preprocessor to build the zh-Hant catalog under /zh-Hant/ (see
        # docs/scripts/aggregate.sh). mdBook fails the build if a configured
        # preprocessor binary is missing, so it must be on PATH before Aggregate.
        # No prebuilt release binaries are published upstream, so build from
        # crates.io (pinned). 0.4.x supports mdBook 0.5.x's RenderContext; a
        # harmless "built against 0.5.4, called from 0.5.2" version-skew warning
        # is expected and non-fatal (same class as mdbook-mermaid's).
        run: cargo install mdbook-i18n-helpers --version 0.4.0

      - name: Install uv (python-sdk / mkdocs)
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up Node + pnpm (node-sdk / Docusaurus + Pagefind via npx)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Set up Go + Hugo extended (go-sdk / Hugo + Hextra)
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: "0.163.0"
          extended: true

      # --- the one aggregation step (clones modules, builds each under its
      #     subpath base URL, builds the hub at root, runs Pagefind, and
      #     FAILS if any module's output dir is missing/empty) ---
      - name: Aggregate
        run: bash docs/scripts/aggregate.sh

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
