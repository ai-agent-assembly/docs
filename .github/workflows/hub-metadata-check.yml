name: Hub metadata drift check

# Docs-hub component metadata gate (AAASM-4313 / Epic AAASM-4309).
#
# Fails the build if any hand-authored page under docs/src/ has drifted from
# hub-components.toml — i.e. if a maintainer edited a component table/list
# inside the BEGIN/END GENERATED:hub-components:* markers by hand instead of
# updating the manifest and regenerating. Runs the same command a contributor
# runs locally: `python3 docs/scripts/generate_hub_components.py --check`.
#
# It also runs the stale-repo-name audit (AAASM-4742): the same manifest is the
# source of canonical component names, and the audit fails on any retired
# pre-rename repo name (Epic AAASM-4341) left in tracked prose/config, and on a
# program-count that disagrees with the manifest's aggregated-component count.
#
# And it runs the compatibility-matrix drift gate (AAASM-4917 / ADR 0013): the
# core<->SDK matrix in docs/src/compatibility.md is generated from
# compatibility.toml, and this fails the build if the committed page has drifted
# from the manifest (`generate_compatibility.py --check`). This is the version-drift
# `--check` gate ADR 0013 Appendix B item 2 flagged as documented-but-unwired.
#
# See docs/scripts/generate_hub_components.py for the hub-component generator,
# docs/scripts/check_repo_names.py for the stale-name audit,
# docs/scripts/generate_compatibility.py for the compatibility-matrix generator,
# and hub-components.toml / compatibility.toml for the manifest schemas.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  hub-metadata-check:
    name: Verify hub component metadata is in sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout hub
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          # tomllib is standard-library from 3.11 onward; the aggregate.yml
          # workflow pins 3.12 for the same reason.
          python-version: "3.12"

      - name: Verify hub-components.toml drives docs/src/
        run: python3 docs/scripts/generate_hub_components.py --check

      - name: Audit tracked docs for stale pre-rename repo names
        run: python3 docs/scripts/check_repo_names.py --check

      - name: Verify compatibility.toml drives docs/src/compatibility.md
        run: python3 docs/scripts/generate_compatibility.py --check
