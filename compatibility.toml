# ------------------------------------------------------------------------------
# [[note]] — footnote bodies. Each row's `ref` keys into one of these by `key`.
#   key  : the identifier referenced by one or more [[release]].ref fields. Many
#          rows may share one note (it is rendered once and cited by each row).
#   text : the full provenance / caveat / breaking-change explanation. This is the
#          long prose that USED to live in an inline "Notes" column; it now renders
#          as a numbered footnote BELOW the table so the table stays compact.
# The generator assigns footnote NUMBERS in first-cited order and renders a
# numbered list; the manifest only supplies stable keys + text.
# ------------------------------------------------------------------------------

[[note]]
key = "rc5"
text = "Latest published core tag and the current product line. Fifth release-candidate in the v0.0.1 series, cut as a coordinated release across agent-assembly + python-sdk + node-sdk + go-sdk: all four repos carry a v0.0.1-rc.5 tag, PyPI publishes 0.0.1rc5, and npm publishes @agent-assembly/sdk@0.0.1-rc.5 under the rc dist-tag. Each SDK at this tag is built against the matching rc.5 core revision, so the tag<->tag pairing is authoritative."

[[note]]
key = "rc4"
text = "Published core tag. Fourth release-candidate in the v0.0.1 series, cut as a coordinated release across agent-assembly + python-sdk + node-sdk + go-sdk: all four repos carry a v0.0.1-rc.4 tag, PyPI publishes 0.0.1rc4, and npm publishes @agent-assembly/sdk@0.0.1-rc.4 under the rc dist-tag. A release-pipeline completeness cut with no wire-protocol change: it ships the previously-omitted aa-api-server binary and publishes the aa-gateway container image, adds a release-artifact completeness gate, builds every supported Python interpreter (cp312/cp313/cp314), bundles the Node native .node binding, and serves local-mode gRPC agent registration on loopback 127.0.0.1:50051. Each SDK at this tag is built against the matching rc.4 core revision, so the tag<->tag pairing is authoritative."

