# ------------------------------------------------------------------------------
# BREAKING-CHANGE EXAMPLE (commented out — guidance only, does NOT render).
# ------------------------------------------------------------------------------
# When a future core release bumps the wire protocol, copy this shape. Here core
# v0.2.0 bumps protocol/v1 -> protocol/v2 (a BREAKING boundary): the SDKs are
# pinned to the new compatible band, and the footnote spells out that SDKs older
# than 0.2.0 cannot speak protocol/v2. Note the per-SDK cells use RANGES, and the
# new `proto` value differs from the rows above it.
#
# [[release]]
# core = "v0.2.0"
# status = "current"
# proto = "protocol/v2"          # <- changed from protocol/v1 == breaking boundary
# ref = "v2-break"
# [release.sdks]
# python = ">=0.2.0,<0.3.0"
# node = ">=0.2.0,<0.3.0"
# go = ">=0.2.0,<0.3.0"
#
# [[note]]
# key = "v2-break"
# text = "BREAKING: core v0.2.0 bumps the wire protocol to protocol/v2. SDKs older than 0.2.0 (which speak protocol/v1) are INCOMPATIBLE and must be upgraded to the >=0.2.0,<0.3.0 band; mixing a protocol/v1 SDK with a protocol/v2 core (or vice-versa) is unsupported."

# ------------------------------------------------------------------------------
# [requirements] — per-SDK runtime requirement + install one-liner.
#   runtime : the language-runtime version constraint, copied verbatim from the
#             SDK's own manifest (the authoritative source named in `source`).
#   install : a copy-pasteable install command for the published package.
#   source  : where `runtime` was read from (for the maintainer's audit trail).
# ------------------------------------------------------------------------------

[requirements.python]
label = "Python SDK"
runtime = "Python >=3.12,<4.0"
install = "pip install agent-assembly --pre"
source = "python-sdk pyproject.toml [project].requires-python"

[requirements.node]
label = "Node SDK"
runtime = "Node.js >=18.18.0 (pnpm >=10 to build from source)"
install = "npm install @agent-assembly/sdk@rc"
source = "node-sdk package.json [engines]"

[requirements.go]
label = "Go SDK"
runtime = "Go >=1.26.0"
install = "go get github.com/ai-agent-assembly/go-sdk@latest"
source = "go-sdk go.mod (go directive)"

# ------------------------------------------------------------------------------
# [badges] — slugs for the live "latest published version" badge strip.
# Registered third-party slugs keep their original registry casing.
#   * PyPI distribution name and npm package name are case/scope sensitive.
#   * GitHub org/repo resolve case-insensitively; canonical casing is lowercase
#     `ai-agent-assembly` (org policy).
# The version badges are LIVE — no hardcoded version. Python reads PyPI, Node reads
# npm's `rc` dist-tag, Core uses shields.io `github/v/release`
# (`include_prereleases&sort=semver`), and Go uses `github/v/tag` (`sort=semver`).
# Core uses the RELEASE endpoint (not tag): the monorepo carries a non-release
# `spec/*` tag that pollutes `github/v/tag` semver sorting, and core cuts GitHub
# Releases. Go uses the TAG endpoint because go-sdk publishes tags but no Releases.
# ------------------------------------------------------------------------------

[badges]
# Core: GitHub RELEASE badge, include_prereleases&sort=semver (live latest release).
core_github_repo = "ai-agent-assembly/agent-assembly"
# Python: PyPI distribution name (live latest from PyPI).
pypi_package = "agent-assembly"
# Node: npm scoped package; the prerelease line now lives under the `rc` dist-tag.
npm_package = "@agent-assembly/sdk"
npm_dist_tag = "rc"
# Go: no semantic registry and no GitHub Releases; use the GitHub TAG badge, sort=semver (live latest tag).
go_github_repo = "ai-agent-assembly/go-sdk"
go_module = "github.com/ai-agent-assembly/go-sdk"
